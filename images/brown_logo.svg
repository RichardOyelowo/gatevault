<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 260" width="1400" height="260">

<style>

.bg{fill:#000;}

.logo{
font-family:"Courier New",monospace;
font-size:160px;
font-weight:700;
letter-spacing:20px;

fill:none;
stroke:#6b3f1f;
stroke-width:5;

stroke-dasharray:2000;
stroke-dashoffset:2000;

animation:draw 6s ease-in-out infinite;
}

.tag{
font-family:"Courier New",monospace;
font-size:18px;
letter-spacing:3px;
fill:#fff;
opacity:.95;
text-anchor:middle;
}

@keyframes draw{

0%{stroke-dashoffset:2000}
40%{stroke-dashoffset:0}
45%{stroke-dashoffset:0}
90%{stroke-dashoffset:2000}
100%{stroke-dashoffset:2000}

}

</style>

<rect class="bg" width="1400" height="260" rx="16"/>

<text class="logo" x="700" y="165" text-anchor="middle">
GATEVAULT
</text>

<rect x="300" y="182" width="800" height="3" fill="#fff" opacity=".2" rx="2"/>

<text class="tag" x="700" y="230">
PYTHON AUTH LIBRARY · pip install richard-gatevault
</text>

</svg>
