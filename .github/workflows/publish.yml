name: Publish to PyPI + Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: pip install hatchling build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      # ---------------- RELEASE NOTES ----------------
      - name: Generate structured release notes
        id: notes
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');

            const commit = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha
            });

            const msg = commit.data.commit.message.split('\n')[0];

            const groups = {
              feat: [],
              fix: [],
              docs: [],
              other: []
            };

            if (msg.startsWith('feat:')) {
              groups.feat.push(msg.replace('feat:', '').trim());
            } else if (msg.startsWith('fix:')) {
              groups.fix.push(msg.replace('fix:', '').trim());
            } else if (msg.startsWith('docs:')) {
              groups.docs.push(msg.replace('docs:', '').trim());
            } else {
              groups.other.push(msg);
            }

            let body = `## 🚀 ${tag}\n\n`;

            if (groups.feat.length) {
              body += `### ✨ Features\n- ${groups.feat[0]}\n\n`;
            }

            if (groups.fix.length) {
              body += `### 🐛 Fixes\n- ${groups.fix[0]}\n\n`;
            }

            if (groups.docs.length) {
              body += `### 📚 Documentation\n- ${groups.docs[0]}\n\n`;
            }

            if (groups.other.length) {
              body += `### 🔧 Other\n- ${groups.other[0]}\n\n`;
            }

            return body;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.result }}
