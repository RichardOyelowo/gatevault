name: Publish to PyPI + Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write   

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: pip install hatchling build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1


      # ---------------- RELEASE NOTES ----------------
      - name: Generate structured release notes
        id: notes
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');

            const { data: commits } = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            const groups = {
              feat: [],
              fix: [],
              docs: [],
              other: []
            };

            for (const commit of commits) {
              const msg = commit.commit.message.split('\n')[0];

              if (msg.startsWith('feat:')) {
                groups.feat.push(msg.replace('feat:', '').trim());
              } else if (msg.startsWith('fix:')) {
                groups.fix.push(msg.replace('fix:', '').trim());
              } else if (msg.startsWith('docs:')) {
                groups.docs.push(msg.replace('docs:', '').trim());
              } else {
                groups.other.push(msg);
              }
            }

            let body = `## 🚀 ${tag}\n\n`;

            if (groups.feat.length) {
              body += `### ✨ Features\n${groups.feat.map(x => `- ${x}`).join('\n')}\n\n`;
            }

            if (groups.fix.length) {
              body += `### 🐛 Fixes\n${groups.fix.map(x => `- ${x}`).join('\n')}\n\n`;
            }

            if (groups.docs.length) {
              body += `### 📚 Documentation\n${groups.docs.map(x => `- ${x}`).join('\n')}\n\n`;
            }

            if (groups.other.length) {
              body += `### 🔧 Other\n${groups.other.map(x => `- ${x}`).join('\n')}\n\n`;
            }

            return body;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.result }}